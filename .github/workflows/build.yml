name: Build Android App

on:
  workflow_dispatch:
    inputs:
      sellerId:
        description: Seller ID
        required: true
        type: string
      appName:
        description: App name
        required: true
        type: string
      themeId:
        description: Theme ID
        required: true
        type: string
      themeVersion:
        description: Theme version
        required: true
        type: string
      themeColor:
        description: Theme color
        required: true
        type: string
      callbackUrl:
        description: Callback URL
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          SELLER_ID: ${{ github.event.inputs.sellerId }}
          APP_NAME: ${{ github.event.inputs.appName }}
          THEME_ID: ${{ github.event.inputs.themeId }}
          THEME_VERSION: ${{ github.event.inputs.themeVersion }}
          THEME_COLOR: ${{ github.event.inputs.themeColor }}
          CALLBACK_URL: ${{ github.event.inputs.callbackUrl }}
        run: |
          ./gradlew assembleRelease -PsellerId="$SELLER_ID" -PappName="$APP_NAME" -PthemeId="$THEME_ID" -PthemeVersion="$THEME_VERSION" -PthemeColor="$THEME_COLOR" -PcallbackUrl="$CALLBACK_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
