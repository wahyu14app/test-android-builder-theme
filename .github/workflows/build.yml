name: Build White-Label Android App

on:
  workflow_dispatch:
    inputs:
      sellerId:
        description: Seller ID
        required: true
        type: string
      appName:
        description: App name
        required: true
        type: string
      themeId:
        description: Theme ID
        required: true
        type: string
      themeVersion:
        description: Theme version
        required: true
        type: string
      themeColor:
        description: Theme color
        required: true
        type: string
      callbackUrl:
        description: Callback URL
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          SELLER_ID: ${{ github.event.inputs.sellerId }}
          APP_NAME: ${{ github.event.inputs.appName }}
          THEME_ID: ${{ github.event.inputs.themeId }}
          THEME_VERSION: ${{ github.event.inputs.themeVersion }}
          THEME_COLOR: ${{ github.event.inputs.themeColor }}
          CALLBACK_URL: ${{ github.event.inputs.callbackUrl }}
        run: |
          ./gradlew assembleRelease -PsellerId="$SELLER_ID" -PappName="$APP_NAME" -PthemeId="$THEME_ID" -PthemeVersion="$THEME_VERSION" -PthemeColor="$THEME_COLOR" -PcallbackUrl="$CALLBACK_URL"
          echo "APK_PATH=app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_ENV"
          echo "APK_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ env.APK_PATH }}

      - name: Send success callback
        if: success()
        env:
          CALLBACK_URL: ${{ github.event.inputs.callbackUrl }}
        run: |
          curl --fail --silent --show-error -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: ${{ secrets.QIANPULSA_WEBHOOK_SECRET }}" \
            -d "{\"sellerId\":\"${{ github.event.inputs.sellerId }}\",\"status\":\"SUCCESS\",\"apkUrl\":\"${{ env.APK_URL }}\",\"themeId\":\"${{ github.event.inputs.themeId }}\",\"themeVersion\":\"${{ github.event.inputs.themeVersion }}\"}"

      - name: Send failure callback
        if: failure()
        env:
          CALLBACK_URL: ${{ github.event.inputs.callbackUrl }}
        run: |
          curl --fail --silent --show-error -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-hub-signature-256: ${{ secrets.QIANPULSA_WEBHOOK_SECRET }}" \
            -d "{\"sellerId\":\"${{ github.event.inputs.sellerId }}\",\"status\":\"FAILED\",\"errorMessage\":\"Proses build gagal di tahap kompilasi GitHub Action.\"}"
